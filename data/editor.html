<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialDex - 配置编辑器</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar bg-base-100 border-b border-base-300 px-6">
        <div class="flex-1 gap-3">
            <span class="text-xl font-bold">SocialDex</span>
            <span class="badge badge-ghost">配置编辑器</span>
        </div>
        <div class="flex-none gap-2">
            <label class="btn btn-ghost btn-sm">
                导入
                <input type="file" accept=".json" class="hidden" onchange="importConfig(event)">
            </label>
            <button class="btn btn-primary btn-sm" onclick="addNewAuthor()">添加 UP 主</button>
            <button class="btn btn-outline btn-sm" onclick="exportConfig()">导出</button>
        </div>
    </div>

    <!-- Main layout -->
    <div class="flex" style="height: calc(100vh - 64px)">
        <!-- Sidebar -->
        <div class="w-80 border-r border-base-300 flex flex-col bg-base-200/50">
            <div class="p-3">
                <input type="text" class="input input-bordered input-sm w-full"
                       placeholder="搜索名称或 UID..."
                       id="searchBox" oninput="renderAuthorList()">
            </div>
            <div class="flex-1 overflow-y-auto px-2 pb-2 space-y-1" id="authorList"></div>
            <div class="p-3 border-t border-base-300 text-xs text-center opacity-50" id="authorCount"></div>
        </div>

        <!-- Edit panel -->
        <div class="flex-1 overflow-y-auto" id="mainPanel">
            <div class="flex items-center justify-center h-full">
                <div class="text-center opacity-40">
                    <p class="text-lg">选择一个 UP 主进行编辑</p>
                    <p class="text-sm mt-1">或点击"添加 UP 主"创建新配置</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete modal -->
    <dialog id="deleteModal" class="modal">
        <div class="modal-box">
            <h3 class="font-bold text-lg">确认删除</h3>
            <p class="py-4" id="deleteMessage"></p>
            <div class="modal-action">
                <form method="dialog"><button class="btn btn-sm">取消</button></form>
                <button class="btn btn-error btn-sm" id="confirmDeleteBtn">删除</button>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <!-- Toast -->
    <div id="toastContainer" class="toast toast-top toast-end z-50"></div>

    <script>
    let config = { authors: [] };
    let currentAuthorIndex = -1;

    // --- Init: auto-load config.json from relative path ---
    async function init() {
        try {
            const resp = await fetch('./config.json');
            if (resp.ok) {
                config = await resp.json();
                if (!config.authors) config.authors = [];
                showToast('已自动加载 config.json');
            }
        } catch (e) {
            showToast('未自动加载，请手动导入', 'warning');
        }
        renderAuthorList();
        updateCount();
    }

    // --- Tags: derive from all authors ---
    function getAllTags() {
        const tags = new Set();
        config.authors.forEach(a => (a.tags || []).forEach(t => tags.add(t)));
        return [...tags].sort();
    }

    // --- Toast ---
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const cls = type === 'warning' ? 'alert-warning' : type === 'error' ? 'alert-error' : 'alert-success';
        const el = document.createElement('div');
        el.className = `alert ${cls} shadow-sm text-sm`;
        el.innerHTML = `<span>${message}</span>`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    // --- Render sidebar list ---
    function renderAuthorList() {
        const search = (document.getElementById('searchBox').value || '').toLowerCase();
        const list = document.getElementById('authorList');
        list.innerHTML = '';

        config.authors.forEach((author, index) => {
            if (search && !author.name.toLowerCase().includes(search) && !author.uid.includes(search)) return;

            const isActive = index === currentAuthorIndex;
            const div = document.createElement('div');
            div.className = `p-3 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-primary text-primary-content' : 'hover:bg-base-300'}`;
            div.innerHTML = `
                <div class="font-medium text-sm truncate">${author.name || '未命名'}</div>
                <div class="flex items-center gap-1 mt-1 flex-wrap">
                    ${(author.tags || []).map(t => `<span class="badge ${isActive ? 'badge-secondary' : 'badge-ghost'} badge-xs">${t}</span>`).join('')}
                    <span class="text-xs ${isActive ? 'opacity-70' : 'opacity-40'}">${author.uid}</span>
                </div>
            `;
            div.onclick = () => selectAuthor(index);
            list.appendChild(div);
        });
    }

    function selectAuthor(index) {
        currentAuthorIndex = index;
        renderAuthorList();
        renderMainPanel();
    }

    // --- Render edit panel ---
    function renderMainPanel() {
        const panel = document.getElementById('mainPanel');

        if (currentAuthorIndex === -1) {
            panel.innerHTML = `
                <div class="flex items-center justify-center h-full">
                    <div class="text-center opacity-40">
                        <p class="text-lg">选择一个 UP 主进行编辑</p>
                        <p class="text-sm mt-1">或点击"添加 UP 主"创建新配置</p>
                    </div>
                </div>`;
            return;
        }

        const author = config.authors[currentAuthorIndex];
        const allTags = getAllTags();

        const tagBadges = allTags.map(tag => {
            const selected = (author.tags || []).includes(tag);
            return `<span class="badge ${selected ? 'badge-primary' : 'badge-outline badge-sm'} cursor-pointer transition-all"
                          onclick="toggleTag(${currentAuthorIndex}, '${tag.replace(/'/g, "\\'")}')">${tag}</span>`;
        }).join('');

        panel.innerHTML = `
            <div class="max-w-2xl mx-auto p-6 space-y-5">
                <div class="form-control w-full">
                    <label class="label"><span class="label-text font-medium">平台</span></label>
                    <select class="select select-bordered w-full" onchange="updateField(${currentAuthorIndex}, 'platform', this.value)">
                        <option value="bilibili" ${author.platform === 'bilibili' ? 'selected' : ''}>哔哩哔哩</option>
                        <option value="douyin" ${author.platform === 'douyin' ? 'selected' : ''}>抖音</option>
                    </select>
                </div>

                <div class="form-control w-full">
                    <label class="label"><span class="label-text font-medium">UID</span></label>
                    <input type="text" class="input input-bordered w-full" value="${author.uid}"
                           onchange="updateField(${currentAuthorIndex}, 'uid', this.value)">
                </div>

                <div class="form-control w-full">
                    <label class="label"><span class="label-text font-medium">名称</span></label>
                    <input type="text" class="input input-bordered w-full" value="${author.name}"
                           onchange="updateField(${currentAuthorIndex}, 'name', this.value)">
                </div>

                <div class="form-control w-full">
                    <label class="label"><span class="label-text font-medium">标签</span></label>
                    <div class="flex flex-wrap gap-2 mb-3">
                        ${tagBadges}
                    </div>
                    <div class="flex gap-2">
                        <input type="text" class="input input-bordered input-sm flex-1" id="newTagInput"
                               placeholder="新标签..."
                               onkeydown="if(event.key==='Enter'){event.preventDefault();addNewTag();}">
                        <button class="btn btn-sm btn-outline" onclick="addNewTag()">添加标签</button>
                    </div>
                </div>

                <div class="divider"></div>

                <button class="btn btn-error btn-sm btn-outline" onclick="confirmDelete(${currentAuthorIndex})">
                    删除此 UP 主
                </button>
            </div>`;
    }

    // --- CRUD ---
    function updateField(index, field, value) {
        config.authors[index][field] = value;
        if (field === 'name') renderAuthorList();
    }

    function toggleTag(index, tag) {
        const author = config.authors[index];
        if (!author.tags) author.tags = [];
        const i = author.tags.indexOf(tag);
        if (i === -1) author.tags.push(tag);
        else author.tags.splice(i, 1);
        renderAuthorList();
        renderMainPanel();
    }

    function addNewTag() {
        const input = document.getElementById('newTagInput');
        const tag = input.value.trim();
        if (!tag || currentAuthorIndex === -1) return;
        const author = config.authors[currentAuthorIndex];
        if (!author.tags) author.tags = [];
        if (!author.tags.includes(tag)) author.tags.push(tag);
        renderAuthorList();
        renderMainPanel();
    }

    function addNewAuthor() {
        config.authors.push({ platform: 'bilibili', uid: '', name: '', tags: [] });
        currentAuthorIndex = config.authors.length - 1;
        renderAuthorList();
        renderMainPanel();
        updateCount();
    }

    // --- Delete ---
    function confirmDelete(index) {
        const name = config.authors[index].name || '未命名';
        document.getElementById('deleteMessage').textContent = `确定删除 "${name}" 吗？`;
        document.getElementById('confirmDeleteBtn').onclick = () => {
            deleteAuthor(index);
            document.getElementById('deleteModal').close();
        };
        document.getElementById('deleteModal').showModal();
    }

    function deleteAuthor(index) {
        config.authors.splice(index, 1);
        if (currentAuthorIndex === index) currentAuthorIndex = -1;
        else if (currentAuthorIndex > index) currentAuthorIndex--;
        renderAuthorList();
        renderMainPanel();
        updateCount();
    }

    // --- Import / Export ---
    function importConfig(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                config = data.authors ? data : { authors: data };
                if (!config.authors) config.authors = [];
                currentAuthorIndex = -1;
                renderAuthorList();
                renderMainPanel();
                updateCount();
                showToast(`已导入 ${config.authors.length} 个 UP 主`);
            } catch {
                showToast('配置文件格式错误', 'error');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function exportConfig() {
        const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'config.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('配置已导出');
    }

    function updateCount() {
        document.getElementById('authorCount').textContent = `共 ${config.authors.length} 个 UP 主`;
    }

    // --- Start ---
    init();
    </script>
</body>
</html>
